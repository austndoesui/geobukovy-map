services:
  owner-lookup:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
      - "6080:6080"
    environment:
      - HEADLESS=false
      - PORT=3001
      - DISPLAY=:99
      - PLAYWRIGHT_DATA_DIR=/data/browser-session
    volumes:
      - browser-data:/data/browser-session
    restart: unless-stopped

volumes:
  browser-data:
